<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUETA STORE | تفاصيل المنتج</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root { --orange: #FF6B2B; --dark: #121212; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; }
        .container { width: 90%; max-width: 1000px; margin: auto; padding: 20px; }
        .product-page { display: flex; flex-wrap: wrap; gap: 30px; margin-top: 50px; }
        .product-images { flex: 1; min-width: 300px; }
        .product-images img { width: 100%; border-radius: 15px; border: 2px solid var(--orange); }
        .product-info { flex: 1; min-width: 300px; }
        .product-info h1 { color: var(--orange); font-size: 2rem; }
        .price { font-size: 1.5rem; font-weight: bold; margin: 15px 0; }
        .features { list-style: none; padding: 0; margin: 20px 0; }
        .features li { margin-bottom: 10px; display: flex; align-items: center; }
        .features li::before { content: "✅"; margin-left: 10px; }
        .order-form { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 30px; }
        .order-form input, .order-form select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .order-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .order-btn:hover { background: #e8430a; transform: scale(1.02); }
        .logo img { height: 50px; width: auto; }
        header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html"><img src="logo.png" alt="GUETA STORE"></a>
    </div>
</header>

<div class="container">
    <div class="product-page">
        <div class="product-images">
            <img src="PROD_IMAGE.jpg" alt="Product"> </div>

        <div class="product-info">
            <h1>اسم المنتج هنا</h1>
            <div class="price">299 درهم</div>
            <p>هنا كتب وصف مقنع للمنتج، شنو كيدير وكيفاش غينفع الكليان.</p>
            
            <ul class="features">
                <li>توصيل سريع لجميع المدن</li>
                <li>الدفع عند الاستلام</li>
                <li>ضمان الجودة 100%</li>
            </ul>

            <div class="order-form" id="order">
                <h3>عمر معلوماتك للطلب</h3>
                <form id="orderForm">
                    <input type="text" name="nom" placeholder="الاسم الكامل" required>
                    <input type="tel" name="tel" placeholder="رقم الهاتف" required>
                    <input type="text" name="ville" placeholder="المدينة" required>
                    <input type="hidden" name="product" value="اسم المنتج">
                    <input type="hidden" name="price" value="299">
                    
                    <button type="submit" class="order-btn">اضغط هنا للطلب الآن</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'حط_هنا_رابط_السكريبت_ديالك'; // نفس الرابط اللي خدام ليك دابا
    const form = document.getElementById('orderForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => alert("تم استلام طلبك بنجاح! سنتصل بك قريباً."))
            .catch(error => console.error('Error!', error.message))
    });
</script>

</body>
</html>
